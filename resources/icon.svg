<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Tło: zaokrąglony kwadrat (Android/iOS style) -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Koło: lewa połowa pomarańczowa (RUN), prawa zielona (WALK) -->
  <g filter="url(#soft)">
    <!-- Lewa półkula - RUN (pomarańcz) -->
    <path d="M 512 152
             A 360 360 0 0 0 512 872
             Z" fill="#ea580c"/>
    <!-- Prawa półkula - WALK (zieleń) -->
    <path d="M 512 152
             A 360 360 0 0 1 512 872
             Z" fill="#16a34a"/>
  </g>

  <!-- Subtelna linia podziału -->
  <line x1="512" y1="152" x2="512" y2="872" stroke="rgba(255,255,255,0.35)" stroke-width="6"/>

  <!-- Napisy RUN / WALK -->
  <g font-family="Inter, Arial, Helvetica, sans-serif" font-weight="900" fill="white" text-anchor="middle">
    <text x="346" y="540" font-size="120" letter-spacing="2">RUN</text>
    <text x="678" y="540" font-size="110" letter-spacing="2">WALK</text>
  </g>

  <!-- Strzałki cyklu (naprzemienność) -->
  <g fill="white" opacity="0.95">
    <!-- Górna strzałka: z pomarańczowej (lewo) do zielonej (prawo) -->
    <path d="M 360 230
             Q 512 165 665 230
             L 665 210
             L 720 250
             L 665 290
             L 665 270
             Q 512 215 400 270
             Z"/>
    <!-- Dolna strzałka: z zielonej (prawo) do pomarańczowej (lewo) -->
    <path d="M 665 794
             Q 512 859 360 794
             L 360 814
             L 305 774
             L 360 734
             L 360 754
             Q 512 809 625 754
             Z"/>
  </g>

  <!-- Błysk na lewej półce dla głębi -->
  <path d="M 512 152
           A 360 360 0 0 0 180 420
           L 512 420 Z" fill="rgba(255,255,255,0.08)"/>
  <!-- Błysk na prawej półce -->
  <path d="M 512 152
           A 360 360 0 0 1 844 420
           L 512 420 Z" fill="rgba(255,255,255,0.08)"/>
</svg>
