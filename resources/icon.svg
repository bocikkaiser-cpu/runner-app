<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Tło: zaokrąglony kwadrat (Android adaptive icon safe area) -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Tor / ścieżka biegowa -->
  <path d="M 110 820 Q 512 720 914 820"
        stroke="rgba(255,255,255,0.28)" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 110 820 Q 512 720 914 820"
        stroke="rgba(255,255,255,0.55)" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="4 36"/>

  <!-- Tarcza stopera za figurkami -->
  <circle cx="512" cy="460" r="330" fill="rgba(255,255,255,0.12)"/>
  <circle cx="512" cy="460" r="330" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="10" stroke-dasharray="12 26"/>
  <!-- Wskazówka stopera -->
  <line x1="512" y1="460" x2="720" y2="280" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
  <circle cx="512" cy="460" r="18" fill="white"/>

  <!-- Biegacz (biały), w ruchu -->
  <g fill="white" filter="url(#shadow)">
    <!-- głowa -->
    <circle cx="560" cy="250" r="56"/>
    <!-- tułów -->
    <path d="M 478 330
             Q 560 300 610 350
             L 650 470
             Q 630 495 598 480
             L 560 400
             L 515 500
             L 560 610
             Q 540 640 500 635
             L 440 520
             Q 425 495 435 465
             L 470 365 Z"/>
    <!-- noga tylna (zgięta) -->
    <path d="M 500 635
             L 470 760
             Q 465 785 440 790
             L 370 800
             Q 355 800 355 780
             L 360 765
             L 435 755
             L 460 625 Z"/>
    <!-- noga przednia -->
    <path d="M 560 610
             L 640 720
             L 720 720
             Q 740 720 740 740
             L 735 758
             L 645 762
             Q 615 762 600 740
             L 530 640 Z"/>
    <!-- ramię do przodu -->
    <path d="M 610 350
             L 740 380
             Q 760 385 755 410
             L 748 430
             L 625 410 Z"/>
    <!-- ramię do tyłu zgięte -->
    <path d="M 478 330
             L 390 380
             Q 370 395 385 418
             L 405 430
             L 488 380 Z"/>
  </g>
</svg>
