name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || echo "Android platform already exists"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch AndroidManifest for background audio + wake lock
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Dodaj uprawnienia, jeśli ich nie ma
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("android/app/src/main/AndroidManifest.xml")
          s = p.read_text()
          perms = [
              '<uses-permission android:name="android.permission.WAKE_LOCK" />',
              '<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />',
              '<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />',
              '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
          ]
          for perm in perms:
              if perm not in s:
                  s = s.replace('<application', perm + '\n    <application', 1)
          p.write_text(s)
          print("Manifest patched")
          PY

      - name: Install ImageMagick + librsvg
        run: sudo apt-get update && sudo apt-get install -y imagemagick librsvg2-bin

      - name: Generate Android launcher icons from SVG
        run: |
          set -e
          RES=android/app/src/main/res
          # Rozmiary ikon legacy (ic_launcher, ic_launcher_round)
          declare -A SIZES=( [mdpi]=48 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192 )
          for density in "${!SIZES[@]}"; do
            size=${SIZES[$density]}
            dir="$RES/mipmap-$density"
            mkdir -p "$dir"
            rsvg-convert -w $size -h $size resources/icon.svg -o "$dir/ic_launcher.png"
            rsvg-convert -w $size -h $size resources/icon.svg -o "$dir/ic_launcher_round.png"
            # Adaptive foreground: Android używa 108dp, foreground powinien być 1.5x rozmiaru
            fsize=$(( size * 108 / 48 ))
            rsvg-convert -w $fsize -h $fsize resources/icon-foreground.svg -o "$dir/ic_launcher_foreground.png"
          done
          # Adaptive icon XML + background color
          mkdir -p "$RES/mipmap-anydpi-v26" "$RES/drawable" "$RES/values"
          cat > "$RES/mipmap-anydpi-v26/ic_launcher.xml" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML
          cp "$RES/mipmap-anydpi-v26/ic_launcher.xml" "$RES/mipmap-anydpi-v26/ic_launcher_round.xml"
          # Tło: gradient jako drawable XML
          cat > "$RES/drawable/ic_launcher_background.xml" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <gradient android:angle="135" android:startColor="#0f172a" android:endColor="#1e293b" android:type="linear"/>
          </shape>
          XML
          echo "Icons generated."
          ls -la "$RES/mipmap-xxxhdpi/"

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: runwalk-timer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build release AAB (unsigned)
        run: cd android && ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: runwalk-timer-release-aab-unsigned
          path: android/app/build/outputs/bundle/release/app-release.aab
