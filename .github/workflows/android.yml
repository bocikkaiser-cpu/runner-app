name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || echo "Android platform already exists"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch AndroidManifest for background audio + wake lock
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Dodaj uprawnienia, jeśli ich nie ma
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("android/app/src/main/AndroidManifest.xml")
          s = p.read_text()
          perms = [
              '<uses-permission android:name="android.permission.WAKE_LOCK" />',
              '<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />',
              '<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />',
              '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
          ]
          for perm in perms:
              if perm not in s:
                  s = s.replace('<application', perm + '\n    <application', 1)
          p.write_text(s)
          print("Manifest patched")
          PY

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: biegacz-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build release AAB (unsigned)
        run: cd android && ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: biegacz-release-aab-unsigned
          path: android/app/build/outputs/bundle/release/app-release.aab
